# ─── Season 1 승격 패턴 (3연승+) ───

promoted_patterns:
  - id: BP-001
    skill: developer
    league: 구현
    streak: 3
    pattern_name: "에러 처리 매트릭스 (7가지 상황별 즉시 조치)"
    why_it_works: "에러 발생 → 유형 분류 → 즉시 조치 경로가 자동화되어 재시도 횟수 최소화"
    applicable_to: [architect, devops, ml-engineer, qa]

  - id: BP-002
    skill: data-analyst
    league: 분석
    streak: 3
    pattern_name: "MCAR/MAR/MNAR 결측 분류 + 품질 스코어 가중치 체계"
    why_it_works: "결측 유형에 따라 처리 전략이 달라지므로, 분류 먼저 → 처리 전략 선택이 정확도를 높임"
    applicable_to: [ml-engineer, researcher, urban-engineer]

  - id: BP-003
    skill: trainer
    league: 커뮤니케이션
    streak: 3
    pattern_name: "Bloom's Taxonomy 5축 리뷰 매트릭스"
    why_it_works: "단순 체크리스트보다 다축 평가가 교육 품질의 다면적 개선을 유도"
    applicable_to: [office-worker, project-manager, researcher]

  - id: BP-004
    skill: admin
    league: 전략
    streak: 3
    pattern_name: "규칙 생명주기 (Draft → Candidate → Active → Deprecated)"
    why_it_works: "규칙의 과잉 축적을 방지하고, 검증되지 않은 규칙이 시스템을 오염시키는 것을 차단"
    applicable_to: [developer, qa, data-analyst, researcher]

