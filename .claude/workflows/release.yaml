name: release
owner: admin
version: 1.1
trigger: ["릴리즈", "release", "배포"]
description: "품질 검증부터 배포·보고까지 릴리즈 파이프라인"
handoff_enabled: true

entry_conditions:
  - code_review_passed        # 코드 리뷰 통과
  - all_tests_passed          # 전체 테스트 통과

exit_conditions:
  - deployment_verified       # 배포 정상 확인
  - release_report_generated  # 릴리즈 보고서 생성

fallback:
  - rollback                  # 배포 실패 시 롤백

steps:
  - skill: qa
    mode: 품질게이트
    gate: true
    handoff: true
    description: "[강제 체크포인트] 릴리즈 전 품질 최종 검증 (실패 시 중단)"

  - skill: devops
    mode: 환경점검
    gate: true
    handoff: true
    on_reject: developer
    max_iterations: 2
    description: "[강제 체크포인트] 배포 환경 사전 점검"

  - skill: devops
    mode: 배포
    handoff: true
    description: "배포 실행"

  - skill: project-manager
    mode: 보고서
    handoff: true
    description: "릴리즈 보고서 작성"

on_failure: rollback → notify_user
